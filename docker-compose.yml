version: '3.8'

services:
  backend:
    build: ./backend
    container_name: attendtrack-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/ca.pem:/app/ca.pem:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: attendtrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped